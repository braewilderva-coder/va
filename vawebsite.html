<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name | Voice Actor</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      background: #020617;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    p {
      color: #94a3b8;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .demo {
      background: #1e293b;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
    }

    .demo h3 {
      margin-top: 0;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #64748b;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }
  </style>
</head>
<body>

<header>
  <h1>Your Name</h1>
  <p>Voice Actor | Narration | Character Work</p>
</header>

<div class="container">

  <section>
    <h2>Demo Reels</h2>

    <div class="demo">
      <h3>Commercial Demo</h3>
      <p>Bright, energetic reads for ads and promos.</p>
      <audio controls>
        <source src="audio/commercial.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>

    <div class="demo">
      <h3>Character Demo</h3>
      <p>Range of character voices and acting styles.</p>
      <audio controls>
        <source src="audio/character.mp3" type="audio/mpeg">
      </audio>
    </div>

    <div class="demo">
      <h3>Narration Demo</h3>
      <p>Calm, clear storytelling and documentary style.</p>
      <audio controls>
        <source src="audio/narration.mp3" type="audio/mpeg">
      </audio>
    </div>

  </section>

</div>

<footer>
  <p>Contact: your@email.com</p>
</footer>

</body>
</html>
